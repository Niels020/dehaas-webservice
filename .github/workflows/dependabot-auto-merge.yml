# Auto-merge Dependabot PRs (minor + patch only)
#
# What this does:
# - Triggers when a Dependabot PR passes CI
# - Checks if the update is minor or patch (not major)
# - If yes: enables auto-merge so GitHub merges it once all checks pass
#
# Why:
# - Minor/patch updates are backwards-compatible by semver convention
# - Auto-merging them means your site stays current without manual work
# - Major versions (breaking changes) are left open for your review
#
# From finding F-3: we pass github-token explicitly and check
# pull_request.user.login instead of github.actor for reliability.

name: Auto-merge Dependabot

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      # Only auto-merge minor and patch updates.
      # Major versions may have breaking changes — those stay open for manual review.
      - name: Enable auto-merge for minor/patch
        if: steps.metadata.outputs.update-type == 'version-update:semver-minor' || steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
