<svg viewBox="0 0 360 140" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>dehaas webservice</title>
  <desc>Two vertical strokes suggesting hare ears, alongside the wordmark "dehaas" with "webservice" beneath.</desc>
  <style>
    .mark { stroke: #000000; }
    .wordmark, .tagline { fill: #000000; }
    .wordmark { font-family: -apple-system, system-ui, "Inter", "Helvetica Neue", sans-serif; font-size: 60px; font-weight: 500; letter-spacing: -2px; }
    .tagline { font-family: -apple-system, system-ui, "Inter", "Helvetica Neue", sans-serif; font-size: 22px; font-weight: 400; letter-spacing: 5px; }
    @media (prefers-color-scheme: dark) {
      .mark { stroke: #ffffff; }
      .wordmark, .tagline { fill: #ffffff; }
    }
  </style>
  <line class="mark" x1="20" y1="22" x2="20" y2="82" stroke-width="7" stroke-linecap="round"/>
  <line class="mark" x1="42" y1="42" x2="42" y2="82" stroke-width="7" stroke-linecap="round"/>
  <text class="wordmark" x="72" y="78">dehaas</text>
  <text class="tagline" x="72" y="114">webservice</text>
</svg>
